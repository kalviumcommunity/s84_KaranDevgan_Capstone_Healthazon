name: Deploy to Render - Development

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      DOCKER_REPO: healthazon

    steps:
      # Checkout repo to get commit info
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Find the version tag for this commit
      - name: Find version tag for current commit
        run: |
          # Get all tags pointing to current commit
          VERSION_TAG=$(git tag --points-at HEAD | grep '^v' | head -n 1)

          if [ -z "$VERSION_TAG" ]; then
            echo "❌ No version tag (v*) found for this commit!"
            echo "Please tag this commit with a version (e.g., v1.0.1) before deploying."
            exit 1
          fi

          echo "Found version tag: $VERSION_TAG"
          IMAGE="docker.io/${{ secrets.DOCKER_USERNAME }}/${DOCKER_REPO}:${VERSION_TAG}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV
          echo "🐳 Will deploy image: $IMAGE"

      - name: Deploy to Render
        run: |
          echo "🚀 Triggering Render deployment..."
          
          # URL-encode the image URL completely (handling slashes, etc.)
          ENCODED_IMAGE=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${{ env.IMAGE }}', safe=''))")
          
          # Determine proper separator: Render deploy hooks already contain '?key=' so we should append using '&'
          if [[ "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" == *\?* ]]; then
            SEPARATOR="&"
          else
            SEPARATOR="?"
          fi

          # Safely print URL with masked key for debugging
          MASKED_URL=$(echo "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | sed 's/key=[^&]*/key=**redacted**/g')
          echo "Calling hook: ${MASKED_URL}${SEPARATOR}imgURL=${ENCODED_IMAGE}"

          # Call Render deploy webhook with image tag via query parameter
          RESPONSE=$(curl -sS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}${SEPARATOR}imgURL=${ENCODED_IMAGE}" \
            -w "\n%{http_code}")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Render deployment triggered successfully"
          else
            echo "❌ Failed to trigger Render deployment"
            echo "HTTP Status: $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi
